# ── Recommendation ─────────────────────────────────────────────────────────────
recommendation: >
  Defer Rami Levy to a dedicated follow-up task. Before scraping:
  1. Probe matrixcatalog.co.il for a Rami Levy chain_id (may host their feed).
  2. Confirm whether prices.rami-levy.co.il is a geo-restricted or network-restricted
     portal (may require an Israeli IP or a specific ISP route).
  3. If a barcode feed is obtained, pair with OFF using the same il_prices+OFF model
     as multiretailer_cereals (01_acquire_multiretailer.py). Filter rate expected >50%
     due to Rami Levy's private-label volume and lower labeling transparency.
  Ingredient coverage cannot be estimated until a product sample is accessible.
  The 70% ingredient coverage threshold (TASK-210 Phase A gate) cannot be evaluated.

next_task_suggestion: "TASK-210 follow-up: Rami Levy portal re-probe + matrixcatalog investigation"
