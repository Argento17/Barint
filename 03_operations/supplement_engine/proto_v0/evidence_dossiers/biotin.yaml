    citations: []
    supp_ev: "SUPP-EV-014"
    rationale: "DOES NOT MAP (mirrors English 'hair'). Benefit deficiency-confined (SR 28879195); no replete-adult endpoint. Keeping it null preserves the cap-1 floor — the loophole-proof FLOOR is the point of this dossier."
    verification_status: "candidate"
    should_affect_score_now: false
  - phrase: "עור"                      # "skin" (Hebrew) — mirrors English skin=null
    resolves_to: null
    resolved_tier: null
    citations: []
    supp_ev: "SUPP-EV-014"
    rationale: "DOES NOT MAP (mirrors English 'skin'). Deficiency-confined; no replete-adult endpoint. Null preserved by design."
    verification_status: "candidate"
    should_affect_score_now: false
  - phrase: "ציפורניים"                # "nails" (Hebrew) — mirrors English nails=null
    resolves_to: null
    resolved_tier: null
    citations: []
    supp_ev: "SUPP-EV-014"
    rationale: "DOES NOT MAP (mirrors English 'nails'). Brittle-nail evidence deficiency/pathology-confined; no replete-adult endpoint. Null preserved by design."
    verification_status: "candidate"
    should_affect_score_now: false
  umbrella_resolution_summary: >
    Biotin label "for hair, skin, nails & energy" resolves: hair->null, skin->null, nails->null, energy->null —
    NOTHING MAPS. Per §2.1 step 3 + §3 cap-1: with NO endpoint plausibly mapping, the Insufficient-Evidence ceiling
    FIRES -> a cosmetic-claim biotin is correctly capped at E (and §2.2 short-circuits Dose to N/A so the mega-dose
    earns no 'well-dosed' credit). This is the moderate posture working as a FLOOR, not a loophole: a deficiency-only
    active marketed at the replete general buyer for an unstudied cosmetic benefit scores E. (Contrast: the ONLY way
    biotin scores well is a label that honestly claims biotin-deficiency correction — which DOES map Strong.)

label_claims_common: ["hair", "skin", "nails", "hair growth", "beauty", "energy", "high potency"]
