# =============================================================================
# Bari Prompt/Artifact Eval Dataset — v1 (50 golden examples)  [CORRECTED 2026-06-10]
# =============================================================================
# Task:    TASK-BARI-PROMPT-REGISTRY-CI-EVAL-V1 — Deliverable 2
# Owners:  content-agent + qa-agent
# Refs:    prompt_registry_v1.yaml, prompt_surface_inventory_v1.md,
#          authored_vs_deterministic_copy_audit_v1.md (Step 0, v1.1 CORRECTED),
#          hebrew_content_golden_eval_v1.md (judge rubric for pairwise examples)
#
# CORRECTION (v1.1): QA review found the v1.0 Step-0 classification inverted.
# Per-builder file evidence shows most shipped insightLine/explanation arrays are
# content-authored or carried-verbatim, NOT deterministic. Routing is corrected:
# only verified-computed builder output uses golden_diff; authored/carried/patched
# copy uses pairwise_judge; unverified provenance uses manual_review until proven.
#
# SCOPE GUARD: references EXISTING artifacts as golden baselines. Does NOT author
# new copy, change prompts, change scoring, or wire CI. Deterministic categorization
# / parsing / scoring already covered by router_regression_corpus.json /
# run_regression_check.py / run_router_regression.py are NOT included.
#
# eval_method legend: golden_diff | schema_validation | pairwise_judge | manual_review
# pairwise rubric = hebrew_content_golden_eval_v1.md (D1 factual_accuracy,
# D2 consumer-facing, D3 assertive/no-apology, D4 framework-invisible, D5 safe-wording).
# =============================================================================

dataset_meta:
  status: "v1 SEED — count-complete (50/50), field-complete (12/12 per example), high-risk coverage PARTIAL (8/17)"
  total_examples: 50
  buckets:
    comparison_copy: 18
    category_caveats: 6
    score_explanation_arrays: 10
    homepage_methodology_glassbox: 4
    evidence_extraction_fidelity: 6
    task_closure_verification: 6
  method_distribution: {pairwise_judge: 33, golden_diff: 10, schema_validation: 4, manual_review: 3}
  method_distribution_note: >
    Primary method per example, verified against this file. golden_diff is now only
    on verified-computed builder output (salty_snacks/snacks/butter insightLine,
    snacks limitingFactors) + closure decisions. manual_review also runs as a SECOND
    gate on CAV-01/02/06 and HMG-02.
  baseline_capture_date: "2026-06-10"
  enforcement_d3b:
    schema_validation: "run_schema_validation_gate.py (EXP-01..04; threshold >= 98%) — ALL PASS 100%"
    pairwise_judge: "run_pairwise_review_gate.py (33 examples; verdict ledger reviews/pairwise_verdicts_v1.yaml + unsafe-wording scan wording_check.py) — ALL PASS"
    unsafe_wording: "wording_check.py + config/unsafe_wording_lexicon_v1.yaml (absolute + needs-reference banned phrases, framework terms, apology markers)"
    open_finding: "CMP-06 yogurt insightLines leak literal 'NOVA 3/4' into consumer copy — recorded as tracked OPEN acknowledged_exception; NOT fixed here (no consumer-copy change in this task); needs content-agent remediation."
  coverage_note: >
    SEED only. High-risk surfaces with concrete examples: T1-01..05, T1-07, T3-03,
    T3-13 (+T3-04). Uncovered high-risk (deferred, NOT closed): nutrition-agent,
    data-agent, skills bundle, and Tier-2 instruction prompts. A v2 coverage task is
    recommended but NOT opened in this deliverable.

