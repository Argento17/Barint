# =============================================================================
# Bari Prompt Registry — v1
# =============================================================================
# Task:        TASK-BARI-PROMPT-REGISTRY-CI-EVAL-V1 (Deliverable 1)
# Source:      01_framework/operations/prompt_surface_inventory_v1.md (discovery PASS)
# Created:     2026-06-10
# Status:      v1 baseline — initial registration of existing surfaces.
#
# SCOPE GUARD: This file REGISTERS existing prompt/LLM-output surfaces. It does
# NOT change any production prompt, consumer copy, scoring, or create eval
# examples. All entries are status: production at version 1.0.0 unless the file
# itself carries a version suffix (then that suffix is reflected) or the surface
# is retired/unused.
#
# -----------------------------------------------------------------------------
# KEY ARCHITECTURAL FINDING (carried from the inventory)
# -----------------------------------------------------------------------------
# Bari makes ZERO programmatic LLM API calls in its own production code. Every
# anthropic/openai/litellm import lives under .venv/. The scoring/data pipeline
# is deterministic. LLM enters Bari via two non-runtime channels:
#   A) LLM-as-operator  — Agent OS instruction files (.md) drive agents that do
#                         the work (authoring copy, extracting evidence, closing
#                         tasks, routing). These files ARE the system prompts.
#   B) LLM-authored copy — consumer Hebrew copy generated by the Content Agent
#                         and frozen into .ts/.json artifacts.
# Consequence: there is no live inference boundary to wrap. A "prompt regression"
# = a change to an instruction file / editorial spec that changes how FUTURE
# artifacts are produced. Eval therefore runs at the ARTIFACT-GENERATION level
# (regenerate from candidate prompt -> compare to baseline), not at an API site.
#
# -----------------------------------------------------------------------------
# FIELD SEMANTICS
# -----------------------------------------------------------------------------
# model_boundary values (how the LLM touches the surface):
#   runtime_api             — live programmatic LLM API call (NONE exist in Bari today)
#   agent_generated_artifact— an Agent OS prompt that drives agent generation/decisions
#                             (a change here regenerates downstream artifacts/decisions)
#   authored_static_copy    — LLM/editorially authored copy frozen into a file (an OUTPUT)
#   deterministic_excluded  — deterministic code; not an LLM surface (see excluded_surfaces)
#
# status values: draft / candidate / production / rollback
#   (rollback is also used for retired/archived surfaces; see notes on each.)
#
# eval_method values:
#   schema_validation / golden_diff / pairwise_judge / manual_review / import_tripwire
#
# linked_eval_set: "pending:<bucket>" = bucket planned in inventory §7, NOT yet
#   built (eval-example creation is Deliverable 2, explicitly out of scope here).
#   Rubric source for all copy buckets = hebrew_content_golden_eval_v1.md (TASK-220).
# =============================================================================

registry_meta:
  version: "1.0"
  surfaces_registered: 30
  surfaces_excluded: 5
  high_risk_count: 17
  versioning_protocol: "01_framework/operations/prompt_registry_versioning_protocol_v1.md (D4)"
  lifecycle_states: [draft, candidate, production, rollback, deprecated]
  rollback_rule: >
    Every production surface keeps rollback_version pointing at its prior production
    version. On any gate failure attributable to a surface (eval / golden_diff /
    CLS-06 false-close / unregistered LLM import / consumer-copy leakage /
    unauthorized model_boundary change) the surface reverts to rollback_version per
    the D4 protocol section 5 (owner + reviewer sign-off; qa verifies gate green).
  deferred_golden_diff:
    - "EXP-06 snacks limitingFactors — inline in build_salty_snacks_frontend_v2.py main(); needs pure-function extraction before snapshotting."
    - "cereals multiretailer rowVerdict — inline f-string in build_cereals_multiretailer_frontend.py main(); same extraction requirement."
  thresholds_owner_note: >
    Initial CI fail thresholds (schema validity <98%, score-affecting
    classification delta >5%, unsafe/unapproved consumer wording >0, unexplained
    score delta > approved tolerance) live in the task spec and are wired in
    Deliverable 3 (CI design). They are referenced, not implemented, here.

