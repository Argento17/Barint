# =============================================================================
# CI RULES (design references — implemented in Deliverable 3)
# =============================================================================
ci_rules:

  - rule_id: deterministic-regression-passthrough
    applies_to: [D-01, D-02, D-03, D-04, D-05]
    requirement: >
      Deterministic categorization/parsing/scoring stays under the EXISTING
      regression harness (router_regression_corpus.json, run_router_regression.py,
      run_regression_check.py). These are NOT subjected to LLM/pairwise eval. A
      change to any excluded surface must keep those regression suites green.

  - rule_id: llm-import-tripwire
    applies_to: [all]
    eval_method: import_tripwire
    requirement: >
      CI MUST FAIL if any `anthropic`, `openai`, or `litellm` SDK import appears
      ANYWHERE outside `.venv/` UNLESS that import site is registered in this file
      with model_boundary: runtime_api AND status: production AND an approved
      reviewer. This prevents a future live LLM call from silently bypassing the
      registry. Today there are zero such imports; the expected match set is empty.
    suggested_check: >
      grep -rEl "import anthropic|from anthropic|import openai|from openai|import litellm|from litellm" --include=*.py . | grep -v "/.venv/"
      (and the .ts/.js equivalent for @anthropic-ai / 'openai'); non-empty + unregistered => fail.

