# Project Comp — Source Registry v1
# ============================================================================
# Purpose: The verified, public source universe that Project Comp monitors daily.
# This file holds ONLY sources confirmed (via web search, 2026-06-10) to be
# public and relevant. Uncertain / unverified-handle sources live in
# source_candidates_v1.yaml — NOT here (Rule 9).
#
# Core principle: influencers are signal, not evidence. credibility_weight and
# discourse_weight are SEPARATE axes — a viral account can be discourse:high /
# credibility:low. Never collapse them. Never treat follower count as credibility.
#
# Field contract (per source):
#   id, platform, handle_or_name, url, language(he|en|mixed),
#   market(israel|us|uk|eu|global), source_type, credibility_weight(high|medium|low),
#   discourse_weight(high|medium|low), bari_use[], topics[],
#   status(active|candidate|exclude), discovery_reason, notes
#
# Owner: Research Agent (evidence) + Marketing Agent (signal) — joint.
# Status: D0 build. NOT yet wired to a scheduled run (Rule 10).
# Built: 2026-06-10
# ============================================================================

meta:
  version: v1
  built: 2026-06-10
  last_updated: 2026-06-10  # D0b — IL creators (il-023..031); D0c — Yaniv Salman (il-032) + global creators (gl-027..034)
  verification_method: "web search confirmation of public URL + relevance, 2026-06-10"
  active_count_israel: 32   # 22 at D0; +9 at D0b; +1 at D0c (Yaniv Salman)
  active_count_global: 34   # 26 at D0/D0b; +8 verified creators at D0c
  principle: "credibility != virality; influencers are signal not evidence; small high-quality > large noisy"
  promotion_standard_d0b: >
    A creator is ACTIVE only if a public URL/handle was seen RESOLVING as an actual result link
    (own site / Substack / podcast / instagram.com/<handle>) AND the source publishes an ongoing
    public content stream. Handles seen only inside a search-engine summary (not as a live link),
    or service/clinic sites with no evident content stream, stay in candidates (no guessed handles).
  source_type_vocab_extension:
    added: [food_culture]
    reason: >
      D0b introduced 'Israeli food culture figures who shape consumer food discourse' (e.g. Omer Miller).
      These are signal/consumer voices that fit no original enum value. 'food_culture' is signal-only:
      credibility for nutrition is low by default; never evidence_reference. QA-flagged vocab change.

