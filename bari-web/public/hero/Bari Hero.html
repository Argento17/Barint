<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bari — דף הבית</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&family=Geist+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --canvas:#F7F7F2; --ink:#0F1D29; --green:#07936F; --green-soft:#2FAE82;
    --fg1:#111318; --fg2:#4E5663; --fg3:#7A817C;
    --hairline:rgba(15,29,41,0.08);
    --sans:"Heebo","Inter",system-ui,-apple-system,sans-serif;
    --mono:"Geist Mono",ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{background:var(--canvas);color:var(--fg1);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:hidden;}
  img{display:block;}
  a{color:inherit;text-decoration:none;}

  /* ---------------- header ---------------- */
  .site-header{position:sticky;top:0;z-index:50;border-bottom:1px solid rgba(15,29,41,0.08);
    background:rgba(247,247,242,0.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);}
  .hdr-in{max-width:1240px;margin:0 auto;padding:0 28px;height:68px;
    display:flex;align-items:center;justify-content:space-between;gap:40px;}
  .brand{display:flex;align-items:center;flex:none;}
  .brand img{height:30px;width:auto;}
  .nav{display:flex;align-items:center;gap:6px;}
  .nav a.lnk{padding:8px 14px;border-radius:14px;font-size:15px;font-weight:600;
    letter-spacing:-0.012em;color:var(--fg2);transition:background-color .4s,color .4s;}
  .nav a.lnk:hover{background:rgba(255,255,255,0.7);color:var(--fg1);}
  .nl-btn{display:inline-flex;align-items:center;gap:8px;margin-inline-start:14px;height:38px;white-space:nowrap;
    padding:0 16px;border-radius:999px;border:1px solid rgba(15,29,41,0.1);background:#fff;
    font-size:14.5px;font-weight:700;color:var(--ink);box-shadow:0 1px 2px rgba(15,29,41,0.06);
    transition:transform .4s,border-color .4s;}
  .nl-btn:hover{transform:translateY(-1px);border-color:rgba(7,147,111,0.4);}
  .nl-dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
  @media(max-width:760px){ .nav .lnk{display:none;} }

  /* ---------------- hero ---------------- */
  .hero{position:relative;min-height:84vh;display:flex;align-items:center;overflow:hidden;
    border-bottom:1px solid rgba(15,29,41,0.06);}
  .hero-bg{position:absolute;inset:0;z-index:0;pointer-events:none;}
  .glow{position:absolute;border-radius:50%;filter:blur(70px);}
  .glow-a{width:30rem;height:30rem;inset-inline-end:-7rem;top:1rem;background:rgba(47,174,130,0.06);}
  .glow-b{width:24rem;height:24rem;inset-inline-start:-5rem;bottom:-3rem;background:rgba(7,147,111,0.05);}

  .plant-stage{position:absolute;inset:0;margin:auto;width:var(--plant-size,520px);
    height:calc(var(--plant-size,520px) * 1.031);z-index:1;will-change:transform;}
  .plant-stage[data-mode="mascot"]{inset:5% 0 auto 0;}
  .plant{position:absolute;inset:0;transition:opacity .5s;}
  .piece{position:absolute;inset:0;transform-origin:50% 50%;will-change:transform,opacity;}
  .piece img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;}
  .plant-constellation{position:absolute;inset:0;width:100%;height:100%;overflow:visible;transition:opacity .4s;}
  .plant-net{opacity:0;}
  .plant-edge{stroke:rgba(7,147,111,0.55);stroke-width:0.3;vector-effect:non-scaling-stroke;}
  .plant-node{fill:rgba(15,29,41,0.55);}

  .plant-particles{position:absolute;inset:0;z-index:2;pointer-events:none;will-change:transform;}
  .ppart{position:absolute;animation-name:pfloat,pfade;animation-timing-function:linear,ease-in-out;
    animation-iteration-count:infinite;will-change:transform,opacity;}
  .ppart-seed{border-radius:50%;background:var(--green);--pop:0.20;}
  .ppart-leaf{background:var(--ink);border-radius:0 72% 0 72%;--pop:0.09;}
  @keyframes pfloat{from{transform:translateY(0) translateX(0) rotate(0)}
    to{transform:translateY(-130px) translateX(var(--drift,0)) rotate(40deg)}}
  @keyframes pfade{0%,100%{opacity:0}18%,82%{opacity:var(--pop,.3)}}

  .hero-scrim{position:absolute;inset:0;z-index:3;pointer-events:none;
    background:radial-gradient(62% 56% at 50% 47%,
      rgba(247,247,242,0.88) 0%, rgba(247,247,242,0.55) 44%, rgba(247,247,242,0) 74%);}

  .hero-in{position:relative;z-index:5;max-width:1240px;margin:0 auto;padding:72px 28px 88px;width:100%;}
  .hero-col{max-width:980px;margin:0 auto;text-align:center;}

  .badge{display:inline-flex;align-items:center;gap:9px;margin-bottom:26px;padding:9px 17px;
    border-radius:999px;border:1px solid rgba(15,29,41,0.08);background:rgba(255,255,255,0.7);
    backdrop-filter:blur(6px);box-shadow:0 1px 2px rgba(15,29,41,0.05);
    font-size:14.5px;font-weight:700;color:var(--green);white-space:nowrap;}
  .badge img{height:18px;width:18px;}

  .hero-h1{margin:0;font-weight:800;letter-spacing:-0.045em;line-height:1.07;
    font-size:clamp(2.5rem,6.4vw,5.4rem);
    background:linear-gradient(270deg,#0F1D29 0%,#16222F 55%,#46505C 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;text-wrap:balance;}
  .hero-sub{margin:26px auto 0;max-width:620px;font-size:clamp(1.05rem,1.6vw,1.3rem);
    line-height:1.62;color:var(--fg2);text-wrap:pretty;}

  .hero-cta{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:14px;margin-top:38px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;height:52px;padding:0 30px;
    border-radius:16px;font-size:16px;font-weight:700;letter-spacing:-0.01em;cursor:pointer;
    border:1px solid transparent;transition:transform .4s,box-shadow .4s,background-color .4s;}
  .btn svg{width:20px;height:20px;}
  .btn-primary{background:var(--green);color:#F4FBF8;border-color:rgba(7,147,111,0.2);
    box-shadow:0 14px 30px -14px rgba(7,147,111,0.6);}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 20px 40px -14px rgba(7,147,111,0.62);}
  .btn-primary:hover svg{transform:translateX(-3px);}
  .btn-ghost{background:rgba(255,255,255,0.72);color:var(--ink);border-color:rgba(15,29,41,0.1);
    backdrop-filter:blur(6px);box-shadow:0 1px 2px rgba(15,29,41,0.05);}
  .btn-ghost:hover{transform:translateY(-2px);background:#fff;}

  .trust{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:14px 34px;margin-top:54px;}
  .trust .ti{display:flex;align-items:center;gap:9px;font-size:14.5px;font-weight:500;color:var(--fg2);}
  .trust .ti svg{width:20px;height:20px;stroke:var(--green-soft);stroke-width:1.8;fill:none;flex:none;}

  /* entrance — text is always visible (no animation-dependent hiding) */
  .reveal{opacity:1;}
</style>
</head>
<body>
  <header class="site-header">
    <div class="hdr-in">
      <a class="brand" href="#" aria-label="בית Bari"><img src="../assets/bari-logo.png" alt="Bari" /></a>
      <nav class="nav" aria-label="ניווט ראשי">
        <a class="lnk" href="#">השוואות</a>
        <a class="lnk" href="#">בלוג</a>
        <a class="lnk" href="#">מדריכים</a>
        <a class="nl-btn" href="#">הרשמו לניוזלטר<span class="nl-dot"></span></a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="hero-bg" aria-hidden="true">
      <span class="glow glow-a"></span>
      <span class="glow glow-b"></span>
      <div id="plantStage" class="plant-stage"></div>
      <div class="hero-scrim"></div>
    </div>

    <div class="hero-in">
      <div class="hero-col">
        <span class="badge reveal d1"><img src="../assets/bari-icon.png" alt="" />ניתוח מוצרים · המדף הישראלי</span>
        <h1 class="hero-h1 reveal d2">Bari מנתחת מוצרי מזון<br />ומזהה את מה שחשוב באמת</h1>
        <p class="hero-sub reveal d3">פלטפורמה שמפרקת מוצרים מהמדף — רכיבים, עיבוד והקשר קטגוריאלי, לא נתון בודד.</p>
        <div class="hero-cta reveal d3">
          <a class="btn btn-primary" href="#">איך Bari מנתחת מוצרים
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          </a>
          <a class="btn btn-ghost" href="#">השוואות מהמדף</a>
        </div>
        <div class="trust reveal d4">
          <span class="ti"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>קריטריונים ברורים</span>
          <span class="ti"><svg viewBox="0 0 24 24"><path d="M6 18h8"/><path d="M3 22h18"/><path d="M14 22a7 7 0 1 0 0-14h-1"/><path d="M9 14h2"/><path d="M15 6a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v6h6z"/><path d="M12 6V3a1 1 0 0 0-1-1h-1"/></svg>זיהוי דפוסים במוצרים</span>
          <span class="ti"><svg viewBox="0 0 24 24"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>מקורות גלויים ורמת ביטחון</span>
        </div>
      </div>
    </div>
  </section>

  <script src="plant.js"></script>
  <script>
    window.plant = new PlantHero({
      stage: document.getElementById('plantStage'),
      assetBase: '../assets/plant/',
      size: 540, opacity: 0.22, mode: 'watermark',
      shatter: true, period: 7, constellation: true, particles: 0.6, parallax: true,
    });

    // JS-driven text entrance (robust even where CSS animations are paused)
    (function () {
      if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      var els = document.querySelectorAll('.reveal');
      els.forEach(function (el, i) {
        el.style.transform = 'translateY(18px)';
        var start = null, delay = 120 + i * 130, dur = 720;
        function step(ts) {
          if (start === null) start = ts;
          var t = ts - start - delay;
          if (t < 0) { requestAnimationFrame(step); return; }
          var p = Math.min(t / dur, 1), e = 1 - Math.pow(1 - p, 3);
          el.style.transform = 'translateY(' + (18 * (1 - e)) + 'px)';
          if (p < 1) requestAnimationFrame(step); else { el.style.transform = ''; }
        }
        requestAnimationFrame(step);
      });
    })();
  </script>

  <!-- Tweaks -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel">
    const TWEAK_DEFAULTS = {
      placement: "watermark", size: 540, opacity: 0.22,
      shatter: true, interval: 7, constellation: true, density: 0.6, parallax: true,
    };
    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      React.useEffect(() => {
        if (!window.plant) return;
        window.plant.setConfig({
          mode: t.placement, size: t.size, opacity: t.opacity,
          shatter: t.shatter, period: t.interval, constellation: t.constellation,
          particles: t.density, parallax: t.parallax,
        });
      }, [t]);
      return (
        <TweaksPanel title="Tweaks">
          <TweakSection label="Logo placement" />
          <TweakRadio label="Style" value={t.placement} options={["watermark", "mascot"]}
            onChange={(v) => setTweak("placement", v)} />
          <TweakSlider label="Size" value={t.size} min={320} max={680} step={10} unit="px"
            onChange={(v) => setTweak("size", v)} />
          <TweakSlider label="Watermark opacity" value={t.opacity} min={0.06} max={0.6} step={0.02}
            onChange={(v) => setTweak("opacity", v)} />
          <TweakSection label="Animation" />
          <TweakToggle label="Shatter & reform loop" value={t.shatter}
            onChange={(v) => setTweak("shatter", v)} />
          <TweakSlider label="Burst interval" value={t.interval} min={4} max={14} step={0.5} unit="s"
            onChange={(v) => setTweak("interval", v)} />
          <TweakToggle label="Constellation lines" value={t.constellation}
            onChange={(v) => setTweak("constellation", v)} />
          <TweakButton label="Replay assembly" onClick={() => window.plant && window.plant.replay()} />
          <TweakSection label="Ambient" />
          <TweakSlider label="Floating particles" value={t.density} min={0} max={1} step={0.1}
            onChange={(v) => setTweak("density", v)} />
          <TweakToggle label="Pointer parallax" value={t.parallax}
            onChange={(v) => setTweak("parallax", v)} />
        </TweaksPanel>
      );
    }
    const m = document.createElement("div");
    document.body.appendChild(m);
    ReactDOM.createRoot(m).render(<App />);
  </script>
</body>
</html>
